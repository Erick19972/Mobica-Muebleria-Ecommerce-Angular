      <p>COMEDOR</p>
    </a>

    <a routerLink="/categoria/recamara" class="cat">
      <img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1200&auto=format&fit=crop" />

    </a>

    <a routerLink="/categoria/oficina" class="cat">

========================= -->

  <div class="banner-content">
    <span class="tag">best seller</span>
    <h3>ESCUADRA MIA CON TABURETE MORETTI</h3>
    <button class="buy-now-btn" [routerLink]="['/checkout']" [queryParams]="{ productId: 52 }">
