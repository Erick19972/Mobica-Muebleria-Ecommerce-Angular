<div class="cart-page">

  <h1>Carrito</h1>

  <div class="cart-item" *ngFor="let item of cartItems()">

    <img [src]="item.image" [alt]="item.title">

    <div class="info">

      <h2>{{ item.title }}</h2>

      <p>{{ item.description }}</p>

      <div class="price">
        $ {{ item.price }}
      </div>

      <button (click)="remove(item.id)">
        Eliminar
      </button>

    </div>

  </div>

  <div class="total">

    TOTAL:
    $ {{ total() }}

  </div>

  <button class="checkout-btn" (click)="pagar()">
    Proceder al pago
  </button>

</div>
