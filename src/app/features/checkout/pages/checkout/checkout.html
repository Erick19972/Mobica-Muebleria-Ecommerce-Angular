<div
  class="checkout-container"
  *ngIf="product()"
>

  <!-- IMAGE -->
  <div class="product-image">

    <img
      [src]="product().image"
      [alt]="product().title"
    >

  </div>

  <!-- INFO -->
  <div class="product-info">

    <h1>
      {{ product().title }}
    </h1>

    <p>
      {{ product().description }}
    </p>

    <div class="price">
      $ {{ product().price }}
    </div>

    <button (click)="pagar()">
      Pagar con Stripe
    </button>

  </div>

</div>
